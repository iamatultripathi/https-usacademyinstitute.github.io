<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | US Academy Institute</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="dashboard.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">US Academy Institute</a>
        <nav class="site-nav">
          <a href="index.html#home">Home</a>
          <a href="index.html#about">About</a>
          <a href="index.html#courses">Courses</a>
          <a href="index.html#contact">Contact</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <h2>Dashboard</h2>
        <p>View incoming student requests and contact data from Firebase.</p>
        <div id="dashboard-status" class="form-note"></div>
        <table class="dashboard-table" id="dashboard-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Name</th>
              <th>Email</th>
              <th>Course</th>
              <th>Message</th>
            </tr>
          </thead>
          <tbody id="dashboard-body"></tbody>
        </table>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>&copy; 2026 US Academy Institute. Built for learning and growth.</p>
      </div>
    </footer>
  </body>
</html>
